<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Moul&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Battambang&family=Moul&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

  <!-- Khmer Calendar -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

  <title>ព័ត៌មានសិស្សទី៩</title>

  <style>
    body {
      font-family: "Segoe UI", sans-serif, "Moul";
      background-color: rgb(216, 236, 253);
      margin: 0;
      padding: 10px;
    }

    form {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      padding: 20px;
      max-width: 800px;
      margin: auto;
      border-radius: 8px;
      box-shadow: 0 0 10px #ccc;
    }

    .form-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 2rem;
    }

    .form-header h2 {
      font-size: 0.96rem;
    }

    .logo {
      height: 50px;
    }

    .form-row {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    label {
      flex: 1;
      display: flex;
      flex-direction: column;
      font-weight: normal;
      font-family: "Battambang", system-ui;
    }

    input,
    select {
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #aaa;
      border-radius: 5px;
      font-family: "Battambang", system-ui;
      font-size: 1rem;
    }

    .flatpickr-months .flatpickr-month {
  font-size: 12px !important;
  font-family: "Battambang", system-ui;
}

.flatpickr-current-month .flatpickr-monthDropdown-months {
  font-size: 12px !important;
}

.flatpickr-current-month input.cur-year {
  font-size: 12px !important;
}

    .options {
      display: flex;
      gap: 15px;
      margin-top: 5px;
      align-items: center;
      flex-wrap: wrap;
    }

    .square-radio input[type="radio"] {
      appearance: none;
      width: 18px;
      height: 18px;
      border: 2px solid #555;
      margin-right: 5px;
      display: inline-block;
      vertical-align: middle;
      border-radius: 3px;
      position: relative;
    }

    .square-radio input[type="radio"]:checked::after {
      content: "✅";
      position: absolute;
      top: -8px;
      left: -4px;
      font-size: 18px;
    }

    .form-buttons {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      flex: 1;
      min-width: 120px;
      padding: 10px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      color: rgb(231, 230, 230);
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      transition: transform 0.2s ease;
      font-family: "Battambang", system-ui;
    }

    button:hover {
      transform: translateY(-2px);
    }

    #status {
      margin-top: 15px;
      text-align: center;
      color: green;
      font-family: "Battambang", system-ui;
    }

    .custom-file-input {
      display: none;
    }

    .custom-file-label {
      display: inline-block;
      padding: 8px 15px;
      background-color: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      font-family: "Battambang", system-ui;
      height: 30px;
    }

    .custom-file-label:hover {
      transform: translateY(-2px);
    }

    .filename-display {
      margin-left: 10px;
      font-family: "Battambang", system-ui;
      font-size: 0.95rem;
    }

    .btn3d {
      position: relative;
      top: -6px;
      border: 0;
      transition: all 40ms linear;
      margin-top: 10px;
    }

    .btn3d:active {
      top: 2px;
    }

    .btn-success {
      box-shadow:
        0 0 0 1px #31c300 inset,
        0 0 0 2px rgba(255, 255, 255, 0.15) inset,
        0 8px 0 0 #5eb924,
        0 8px 8px 1px rgba(0, 0, 0, 0.5);
      background-color: #42a302;
    }

    .btn-default {
      color: #666;
      background-color: #bab8b8;
      box-shadow:
        0 0 0 1px #ebebeb inset,
        0 8px 0 0 #BEBEBE,
        0 8px 8px 1px rgba(0, 0, 0, .2);
    }

    @media (max-width: 600px) {
      .form-row {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

  <form id="signupForm">

    <div class="form-header">
      <img src="moeys.png" alt="Logo" class="logo">
      <h2 class="sitename">
        ព័ត៌មានសិស្ស
        <span class="auto-input"></span>
      </h2>
    </div>

    <div class="form-row">
      <label>
        ឈ្មោះសិស្ស
        <input type="text" name="name"
          placeholder="នាមត្រកូល នាមខ្លួន" required>
      </label>

      <label>
        <div class="options">
          ភេទ
          <label class="square-radio">
            ប្រុស
            <input type="radio" name="sex" value="ប្រុស" required>
          </label>

          <label class="square-radio">
            ស្រី
            <input type="radio" name="sex" value="ស្រី">
          </label>
        </div>
      </label>
    </div>

    <div class="form-row">

      <!-- Khmer Calendar -->
      <label>
        ថ្ងៃខែឆ្នាំកំណើត
        <input type="text"
          name="dob"
          id="dob"
          placeholder="ថ្ងៃ/ខែ/ឆ្នាំ"
          required
          readonly>
      </label>

      <label>
        ទីកន្លែងកំណើត
        <input type="text"
          name="pob"
          value="ខេត្តព្រះសីហនុ"
          required>
      </label>

    </div>

    <div class="form-row">

      <label>
        រៀនថ្នាក់ទី

        <select name="grade" required>
          <option value="" disabled selected>ជ្រើសរើស</option>
          <option>9A</option>
          <option>9B</option>
          <option>9C</option>
          <option>9D</option>
          <option>9E</option>
          <option>9F</option>
          <option>9G</option>
          <option>9H</option>
        </select>

      </label>

      <label>
        <div class="options">

          ភាសា

          <label class="square-radio">
            អង់គ្លេស
            <input type="radio"
              name="language"
              value="អង់គ្លេស"
              required>
          </label>

          <label class="square-radio">
            បារាំង
            <input type="radio"
              name="language"
              value="បារាំង">
          </label>

        </div>
      </label>

    </div>

    <div class="form-row">
      <label>
        ឈ្មោះឪពុក
        <input type="text" name="father_name" required>
      </label>

      <label>
        មុខរបរឪពុក
        <input type="text" name="father_job" required>
      </label>
    </div>

    <div class="form-row">
      <label>
        ឈ្មោះម្ដាយ
        <input type="text" name="mother_name" required>
      </label>

      <label>
        មុខរបរម្ដាយ
        <input type="text" name="mother_job" required>
      </label>
    </div>

    <div class="form-row">

      <label>
        លេខទូរសព្ទផ្ទាល់ខ្លួន
        <input type="tel" name="phone" required>
      </label>

      <div>

        <label>សំបុត្រកំណើត</label>

        <label class="custom-file-label">
          ជ្រើសរូបភាព
          <i class="fa-regular fa-image"></i>

          <input type="file"
            name="image"
            class="custom-file-input"
            accept=".jpg,.jpeg,.png"
            required
            onchange="showFileName(this)">
        </label>

        <span class="filename-display"
          id="file-name"
          style="color:red">
          មិនទាន់ជ្រើសរូបភាព
        </span>

      </div>
    </div>

    <div class="form-buttons">

      <button type="reset"
        class="btn3d btn-default">
        សម្អាត
        <i class="fa-solid fa-arrows-rotate"></i>
      </button>

      <button type="submit"
        class="btn3d btn-success">
        រក្សាទុក
        <i class="fa-solid fa-floppy-disk"></i>
      </button>

    </div>

    <p id="status"></p>

  </form>

  <!-- Typed JS -->
  <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>

  <!-- Flatpickr -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

  <script>

    flatpickr("#dob", {
  dateFormat: "d/m/Y",

  monthSelectorType: "static", // remove dropdown month list

  prevArrow: "⬅",
  nextArrow: "➡",

  locale: {
    firstDayOfWeek: 1,

    weekdays: {
      shorthand: ["អា","ច","អ","ព","ព្រ","សុ","ស"],
      longhand: [
        "អាទិត្យ",
        "ចន្ទ",
        "អង្គារ",
        "ពុធ",
        "ព្រហស្បតិ៍",
        "សុក្រ",
        "សៅរ៍"
      ]
    },

    months: {
      shorthand: [
        "មក","កុ","មី","មេ",
        "ឧ","មិ","កក","សី",
        "កញ","តុ","វិ","ធ្នូ"
      ],

      longhand: [
        "មករា",
        "កុម្ភៈ",
        "មីនា",
        "មេសា",
        "ឧសភា",
        "មិថុនា",
        "កក្កដា",
        "សីហា",
        "កញ្ញា",
        "តុលា",
        "វិច្ឆិកា",
        "ធ្នូ"
      ]
    }
  },

 onReady: function(selectedDates, dateStr, instance) {

  // Back Year Button
  const prevYearBtn = document.createElement("span");
  prevYearBtn.innerHTML = "«";
  prevYearBtn.style.cursor = "pointer";
  prevYearBtn.style.marginRight = "10px";
  prevYearBtn.style.fontSize = "18px";

  prevYearBtn.onclick = () => {
    instance.changeYear(instance.currentYear - 1);
  };

  // Year Dropdown Button
  const yearSelect = document.createElement("select");
  yearSelect.style.marginLeft = "10px";
  yearSelect.style.fontSize = "12px";
  yearSelect.style.padding = "2px 5px";
  yearSelect.style.borderRadius = "5px";

  for (let y = 1980; y <= 2050; y++) {
    const option = document.createElement("option");
    option.value = y;
    option.textContent = y;

    if (y === instance.currentYear) {
      option.selected = true;
    }

    yearSelect.appendChild(option);
  }

  yearSelect.onchange = function () {
    instance.changeYear(parseInt(this.value));
  };

  // Next Year Button
  const nextYearBtn = document.createElement("span");
  nextYearBtn.innerHTML = "»";
  nextYearBtn.style.cursor = "pointer";
  nextYearBtn.style.marginLeft = "10px";
  nextYearBtn.style.fontSize = "18px";

  nextYearBtn.onclick = () => {
    instance.changeYear(instance.currentYear + 1);
  };

  // Add Buttons
  instance.currentMonthElement.parentNode.prepend(prevYearBtn);
  instance.currentMonthElement.parentNode.appendChild(yearSelect);
  instance.currentMonthElement.parentNode.appendChild(nextYearBtn);
}
});
    // Typed Text
    var typed = new Typed(".auto-input", {
      strings: [
        " នៃវិទ្យាល័យ","ហ៊ុនសែនមិត្តភាព",
        "សម្រាប់ការប្រឡង","សញ្ញាបត្រមធ្យម","សិក្សាបឋមភូមិ"
      ],
      typeSpeed: 150,
      loop: true
    });

    // Form Submit
    document.getElementById("signupForm")
      .addEventListener("submit", async function (e) {

        e.preventDefault();

        const form = e.target;
        const status = document.getElementById("status");
        const submitBtn =
          form.querySelector('button[type="submit"]');

       submitBtn.disabled = true;
submitBtn.style.opacity = "0.6";
submitBtn.style.cursor = "not-allowed";
submitBtn.innerHTML = '⏳ កំពុងរក្សាទុក...';

        status.textContent = "⏳ សូមរង់ចាំ...";

        const formData = new FormData(form);

        const imageInput =
          document.querySelector('input[name="image"]');

        const imageFile =
          imageInput.files && imageInput.files[0];

        if (
          !imageFile ||
          imageFile.size === 0 ||
          !imageFile.type.match(/^image\/(jpeg|png)$/)
        ) {

          status.textContent =
            "❌ សូមជ្រើសរូបភាព (.jpg, .png)";

          submitBtn.disabled = false;
          return;
        }

        const reader = new FileReader();

        reader.onload = async function () {

          const imageBase64 = reader.result;

          const data = new URLSearchParams();

          formData.forEach((value, key) => {
            if (key !== "image")
              data.append(key, value);
          });

          data.append("image", imageBase64);
          data.append("imageType", imageFile.type);

          try {

            const response = await fetch(
              "https://script.google.com/macros/s/AKfycbym_HaWSh44TB2M96uGMhxhrBG46Y72h77qsz99ifRwB0X_wBNaPP9YticJoF7cNiUgcg/exec",
              {
                method: "POST",
                body: data,
              }
            );

            const result = await response.text();

            if (
              response.ok &&
              result.includes("Success")
            ) {

              status.textContent =
                "✅ ជោគជ័យ!";

              form.reset();

              document.getElementById("file-name")
                .textContent =
                "មិនទាន់ជ្រើសរូបភាព";

            } else {

              status.textContent =
                "❌ បញ្ហាក្នុងការផ្ញើទិន្នន័យ";

            }

          } catch (err) {

            status.textContent =
              "❌ " + err.message;

          } finally {

            submitBtn.disabled = false;
submitBtn.style.opacity = "1";
submitBtn.style.cursor = "pointer";
submitBtn.innerHTML = `
  រក្សាទុក
  <i class="fa-solid fa-floppy-disk"></i>
`;
          }

        };

        reader.readAsDataURL(imageFile);

      });

    // Reset
    document.getElementById("signupForm")
      .addEventListener("reset", function () {

        document.getElementById("file-name")
          .textContent =
          "មិនទាន់ជ្រើសរូបភាព";

        document.getElementById("file-name")
          .style.color = "red";

      });

    // File Name
    function showFileName(input) {

      const fileNameSpan =
        document.getElementById("file-name");

      if (input.files && input.files[0]) {

        fileNameSpan.textContent =
          "បានជ្រើសរូបភាពហើយ ✅";

        fileNameSpan.style.color = "green";

      } else {

        fileNameSpan.textContent =
          "មិនទាន់ជ្រើសរូបភាព";

        fileNameSpan.style.color = "red";

      }

    }

  </script>

</body>
</html>
